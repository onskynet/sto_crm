name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      - run: flutter pub get
      - run: flutter clean
      - run: rm -rf ~/.gradle/caches/
      - run: rm -rf android && flutter create . --platforms=android
      - run: flutter build apk --release
